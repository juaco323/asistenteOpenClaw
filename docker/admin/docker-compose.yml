services:
  openclaw-admin:
    image: ${OPENCLAW_IMAGE}
    container_name: ${OPENCLAW_CONTAINER_NAME}
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "${OPENCLAW_HOST_PORT}:${OPENCLAW_INTERNAL_PORT}"
    environment:
      NODE_ENV: production
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
    volumes:
      - ${OPENCLAW_STATE_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    command:
      - node
      - dist/index.js
      - gateway
      - --allow-unconfigured
      - --port
      - "${OPENCLAW_INTERNAL_PORT}"
      - --bind
      - lan
